server.port=${PORT:8090}
spring.application.name=web-ui

# URL base del gateway
gateway.base-url=${GATEWAY_BASE_URL:${GATEWAY_URL:http://api-gateway:8080}}

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always




# URLs públicas para la vista de estado de microservicios
services.health.gateway-url=${GATEWAY_HEALTH_URL:${GATEWAY_PUBLIC_URL:http://localhost:8080}/actuator/health}
services.health.auth-url=${AUTH_HEALTH_URL:${AUTH_SERVICE_PUBLIC_URL:http://localhost:8081}/actuator/health}
services.health.debtor-url=${DEBTOR_HEALTH_URL:${DEBTOR_SERVICE_PUBLIC_URL:http://localhost:8082}/actuator/health}
services.health.debt-url=${DEBT_HEALTH_URL:${DEBT_SERVICE_PUBLIC_URL:http://localhost:8083}/actuator/health}
services.health.payment-url=${PAYMENT_HEALTH_URL:${PAYMENT_SERVICE_PUBLIC_URL:http://localhost:8084}/actuator/health}
services.health.fx-url=${FX_HEALTH_URL:${FX_SERVICE_PUBLIC_URL:http://localhost:8085}/actuator/health}
services.health.ai-url=${AI_RISK_HEALTH_URL:${AI_RISK_SERVICE_PUBLIC_URL:http://localhost:8087}/actuator/health}
