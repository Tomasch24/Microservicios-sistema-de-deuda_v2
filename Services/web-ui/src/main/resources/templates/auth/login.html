<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exterminadora Tejada – Iniciar Sesión</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/login.css}" />
    <style>
      /* ── TABS ── */
      .tabs {
        display: flex;
        gap: 0;
        margin-bottom: 28px;
        background: rgba(255, 255, 255, 0.04);
        border-radius: 10px;
        padding: 4px;
        border: 1px solid rgba(255, 255, 255, 0.07);
      }
      .tab-btn {
        flex: 1;
        padding: 9px 0;
        background: transparent;
        border: none;
        border-radius: 7px;
        color: rgba(255, 255, 255, 0.35);
        font-family: "Nunito", sans-serif;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.22s ease;
      }
      .tab-btn.active {
        background: linear-gradient(135deg, #4c5e1a 0%, #6a8422 100%);
        color: #fff;
        box-shadow: 0 4px 14px rgba(76, 94, 26, 0.4);
      }
      .tab-btn:not(.active):hover {
        color: rgba(255, 255, 255, 0.65);
      }

      /* ── PANELS ── */
      .tab-panel {
        display: none;
      }
      .tab-panel.active {
        display: block;
      }

      /* ── ALERT SUCCESS ── */
      .alert-success {
        background: rgba(76, 94, 26, 0.15);
        border: 1px solid rgba(76, 94, 26, 0.4);
        color: #a3c44a;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 13px;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      /* Panel registro — campos más compactos */
      #panel-register .field {
        margin-bottom: 14px;
      }

      /* Wrapper ancho cuando registro activo */
      .wrapper.register-mode {
        min-height: 640px;
      }

      .panel-right {
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <div class="bg-grid"></div>

    <div class="wrapper" id="main-wrapper">
      <!-- LEFT PANEL -->
      <div class="panel-left">
        <div class="logo-area">
          <img th:src="@{/images/logo.png}" alt="Exterminadora Tejada" />
        </div>
        <div class="divider"></div>
        <p class="panel-desc">
          Sistema de gestión integral de<br />deudores y pagos para tu empresa.
        </p>
      </div>

      <!-- RIGHT PANEL -->
      <div class="panel-right">
        <!-- TABS -->
        <div class="tabs">
          <button
            class="tab-btn active"
            onclick="switchTab('login')"
            id="tab-login"
          >
            Iniciar Sesión
          </button>
          <button
            class="tab-btn"
            onclick="switchTab('register')"
            id="tab-register"
          >
            Registrarse
          </button>
        </div>

        <!-- ══ PANEL LOGIN ══ -->
        <div class="tab-panel active" id="panel-login">
          <div class="form-title">Bienvenido</div>
          <div class="form-subtitle">
            Ingresa tus credenciales para continuar
          </div>

          <div th:if="${error}" class="alert-error">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="8" x2="12" y2="12" />
              <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            <span th:text="${error}"></span>
          </div>

          <form method="post" th:action="@{/auth/login}" id="form-login">
            <div class="field">
              <label>Correo Electrónico</label>
              <div class="field-wrap">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                  />
                  <polyline points="22,6 12,13 2,6" />
                </svg>
                <input
                  type="email"
                  name="email"
                  placeholder="usuario@tejada.com"
                  required
                  autocomplete="email"
                />
              </div>
            </div>

            <div class="field">
              <label>Contraseña</label>
              <div class="field-wrap">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <rect x="3" y="11" width="18" height="11" rx="2" />
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
                <input
                  type="password"
                  name="password"
                  placeholder="••••••••"
                  required
                  autocomplete="current-password"
                />
              </div>
            </div>

            <button type="submit" class="btn-submit" id="btn-login">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
                <polyline points="10 17 15 12 10 7" />
                <line x1="15" y1="12" x2="3" y2="12" />
              </svg>
              Ingresar al Sistema
            </button>
          </form>
        </div>

        <!-- ══ PANEL REGISTRO ══ -->
        <div class="tab-panel" id="panel-register">
          <div class="form-title">Crear Cuenta</div>
          <div class="form-subtitle">Completa los datos para registrarte</div>

          <div th:if="${registerError}" class="alert-error">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="8" x2="12" y2="12" />
              <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            <span th:text="${registerError}"></span>
          </div>

          <div th:if="${registerSuccess}" class="alert-success">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
              <polyline points="22 4 12 14.01 9 11.01" />
            </svg>
            <span th:text="${registerSuccess}"></span>
          </div>

          <form method="post" th:action="@{/auth/register}" id="form-register">
            <div class="field">
              <label>Nombre Completo</label>
              <div class="field-wrap">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                  <circle cx="12" cy="7" r="4" />
                </svg>
                <input
                  type="text"
                  name="fullName"
                  placeholder="Juan Pérez"
                  required
                  autocomplete="name"
                />
              </div>
            </div>

            <div class="field">
              <label>Usuario</label>
              <div class="field-wrap">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                  <circle cx="12" cy="7" r="4" />
                </svg>
                <input
                  type="text"
                  name="username"
                  placeholder="juanperez"
                  required
                  autocomplete="username"
                />
              </div>
            </div>

            <div class="field">
              <label>Correo Electrónico</label>
              <div class="field-wrap">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                  />
                  <polyline points="22,6 12,13 2,6" />
                </svg>
                <input
                  type="email"
                  name="email"
                  placeholder="juan@tejada.com"
                  required
                  autocomplete="email"
                />
              </div>
            </div>

            <div class="field">
              <label>Contraseña</label>
              <div class="field-wrap">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <rect x="3" y="11" width="18" height="11" rx="2" />
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
                <input
                  type="password"
                  name="password"
                  placeholder="••••••••"
                  required
                  autocomplete="new-password"
                />
              </div>
            </div>

            <button type="submit" class="btn-submit" id="btn-register">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                <circle cx="9" cy="7" r="4" />
                <line x1="19" y1="8" x2="19" y2="14" />
                <line x1="22" y1="11" x2="16" y2="11" />
              </svg>
              Crear Cuenta
            </button>
          </form>
        </div>

        <div class="footer-note">
          © 2026 Exterminadora Tejada · Todos los derechos reservados
        </div>
      </div>
    </div>

    <script th:src="@{/js/login.js}"></script>
    <script>
      function switchTab(tab) {
        // Botones
        document
          .getElementById("tab-login")
          .classList.toggle("active", tab === "login");
        document
          .getElementById("tab-register")
          .classList.toggle("active", tab === "register");
        // Panels
        document
          .getElementById("panel-login")
          .classList.toggle("active", tab === "login");
        document
          .getElementById("panel-register")
          .classList.toggle("active", tab === "register");
        // Wrapper height
        document
          .getElementById("main-wrapper")
          .classList.toggle("register-mode", tab === "register");
      }

      // Si hay error de registro, abrir tab de registro automáticamente
      document.addEventListener("DOMContentLoaded", function () {
        const hasRegisterError = /*[[${registerError != null}]]*/ false;
        const hasRegisterSuccess = /*[[${registerSuccess != null}]]*/ false;
        if (hasRegisterError || hasRegisterSuccess) {
          switchTab("register");
        }
      });
    </script>
  </body>
</html>
