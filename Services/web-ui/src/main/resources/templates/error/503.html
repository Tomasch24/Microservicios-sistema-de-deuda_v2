<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Servicio No Disponible</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
  </head>
  <body class="bg-light">
    <div
      class="container d-flex justify-content-center align-items-center"
      style="min-height: 100vh"
    >
      <div class="text-center">
        <h1 class="display-1 text-secondary">503</h1>
        <h4>Servicio No Disponible</h4>
        <p class="text-muted" th:text="${error}">
          El servicio no está disponible. Intenta más tarde.
        </p>
        <a href="/dashboard" class="btn btn-primary">Ir al Dashboard</a>
      </div>
    </div>
  </body>
</html>
