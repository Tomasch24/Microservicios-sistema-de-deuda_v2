spring.application.name=debtor-service
server.port=${PORT:8084}

# CORRECCIÓN — antes usaba H2 en memoria, los datos se perdían en cada reinicio de Railway
# Ahora usa SQLite persistente en disco
spring.datasource.url=jdbc:sqlite:./data/debtor.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT — misma clave que usa auth-service para firmar los tokens
jwt.secret=${JWT_SECRET}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
