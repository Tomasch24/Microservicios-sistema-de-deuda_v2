# =============================================================
# API GATEWAY — application.properties
# =============================================================

spring.application.name=api-gateway
server.port=${PORT:8080}

# =============================================================
# RUTAS
# =============================================================

# auth-service — maneja login, registro y validación de tokens
# user-service ELIMINADO — auth-service es la fuente de verdad de usuarios
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${AUTH_SERVICE_URL:http://auth-service:8080}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

# debtor-service
spring.cloud.gateway.routes[1].id=debtor-service
spring.cloud.gateway.routes[1].uri=${DEBTOR_SERVICE_URL:http://debtor-service:8080}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/debtors/**

# debt-service
spring.cloud.gateway.routes[2].id=debt-service
spring.cloud.gateway.routes[2].uri=${DEBT_SERVICE_URL:http://debt-service:8080}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/debts/**

# payment-service
spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].uri=${PAYMENT_SERVICE_URL:http://payment-service:8080}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/payments/**

# fx-service
spring.cloud.gateway.routes[4].id=fx-service
spring.cloud.gateway.routes[4].uri=${FX_SERVICE_URL:http://fx-service:8080}
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/fx/**

# notification-service
spring.cloud.gateway.routes[5].id=notification-service
spring.cloud.gateway.routes[5].uri=${NOTIFICATION_SERVICE_URL:http://notification-service:8080}
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/notifications/**

# notification-service — reminders
# NUEVO — ReminderClient llama a /api/v1/reminders/**, faltaba esta ruta
spring.cloud.gateway.routes[6].id=notification-service-reminders
spring.cloud.gateway.routes[6].uri=${NOTIFICATION_SERVICE_URL:http://notification-service:8080}
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/reminders/**

# ai-risk-service
# CORRECCIÓN — antes era /api/v1/risk/**, el AiRiskClient llama a /api/v1/ai/**
spring.cloud.gateway.routes[7].id=ai-risk-service
spring.cloud.gateway.routes[7].uri=${AI_RISK_SERVICE_URL:http://ai-risk-service:8080}
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/v1/ai/**

# =============================================================
# ACTUATOR
# =============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# =============================================================
# SWAGGER / OPENAPI
# =============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# =============================================================
# LOGGING
# =============================================================
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.com.example.gateway=DEBUG

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.reactive.ReactiveUserDetailsServiceAutoConfiguration
