# ============================================================
#  payment-service – application.properties
# ============================================================

server.port=${PORT:8084}
spring.application.name=payment-service

# ── Base de Datos (SQLite) ──────────────────────────────────
spring.datasource.url=jdbc:sqlite:./data/payment.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# ── Flyway ─────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── JWT ────────────────────────────────────────────────────
# La clave secreta debe coincidir con la que usa auth-service.
# En producción: externalizar con variables de entorno.
app.jwt.secret=${JWT_SECRET}

# ── debt-service (Resilience4j) ────────────────────────────
app.debt-service.base-url=${DEBT_SERVICE_URL:http://localhost:8083}

# ── Resilience4j – CircuitBreaker para debtClient ──────────
resilience4j.circuitbreaker.instances.debtClient.slidingWindowSize=5
resilience4j.circuitbreaker.instances.debtClient.failureRateThreshold=50
resilience4j.circuitbreaker.instances.debtClient.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.debtClient.permittedNumberOfCallsInHalfOpenState=2
resilience4j.circuitbreaker.instances.debtClient.registerHealthIndicator=true

resilience4j.retry.instances.debtClient.maxAttempts=3
resilience4j.retry.instances.debtClient.waitDuration=500ms

# ── Actuator ───────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers
management.endpoint.health.show-details=always

# ── Swagger / OpenAPI ──────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Jackson ────────────────────────────────────────────────
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ── Logging ────────────────────────────────────────────────
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level [traceId=%X{traceId}] %logger{36} - %msg%n
